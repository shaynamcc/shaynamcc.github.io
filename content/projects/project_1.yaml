title: "Fully Reproducible Sales Data Analysis"

short_summary: >
  This project provides summaries and visualizations for January sales data.
  Using customer lookup information and transaction records, the analysis 
  produces a CSV file with region + category breakdowns for sales, and a bar
  chart showing total revenue by region. This repository is organized with
  separater folders for data, scripts, and results to make it easy to 
  navigate and reproduce. :)


tech_stack:
  - Python
  - pandas
  - plotly
  - matplotlib
  - Docker
  - Conda

problem_statement: >
  Raw sales data is often fragmented across multiple CSV files (transactions, customer lookups, 
  and weather records), making it difficult for stakeholders to quickly assess regional 
  performance. Without a reproducible pipeline, manual data cleaning and visualization 
  lead to inconsistencies and delayed reporting.

approach: >
  Developed a modular Python pipeline that merges transaction logs with customer regional data. 
  The data is cleaned and aggregated using pandas to calculate metrics like total units, 
  total revenue, and average revenue per order. To ensure portability, the project was 
  containerized using Docker and supports multiple environment setups (venv and Conda). 
  An interactive Plotly visualization was added to allow users to zoom and inspect 
  specific regional data points.

results_impact: >
  The pipeline successfully automates the generation of a 12-row summary report and multiple 
  visualizations. By transitioning from static images to interactive Plotly charts, 
  users gained the ability to hover for exact revenue values and zoom into specific regions, 
  significantly improving data accessibility. The Docker integration ensures the analysis 
  runs identically across Windows, Mac, and Linux environments.

