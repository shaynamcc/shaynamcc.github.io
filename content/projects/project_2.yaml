title: "NYC 311 Service Request Analysis on AWS"

short_summary: >
  This project analyzes around 200,000 NYC 311 service requests and builds a 
  predictive model to forecast complaint resolution times across agencies and boroughs. 
  Using AWS cloud infrastructure (S3, SageMaker) and machine learning (Linear Learner), 
  the project processes large-scale complaint data, performs exploratory analysis, and 
  develops a regression model. The work demonstrates end-to-end cloud data engineering 
  with stakeholder-focused predictive insights.

tech_stack:
  - Python
  - pandas
  - Jupyter Notebooks
  - AWS (S3, SageMaker, Linear Learner)
  - SQL
  - Plotly
  - scikit-learn
  - Git/GitHub

problem_statement: >
  NYC 311 complaint data spans millions of requests across multiple agencies and boroughs. 
  City planners need to predict how long it will take to resolve a ticket and identify 
  which complaint types take longest to resolve, enabling better resource allocation. 

approach: >
  Developed an end-to-end ML pipeline using AWS SageMaker's Linear Learner algorithm to 
  predict complaint resolution times. Data ingestion included loading 200k complaints from 
  S3, parsing string dates, handling missing ZIP codes and resolution descriptions, and 
  feature engineering (complaint type, borough, agency, creation date). Exploratory data 
  analysis revealed complaint distributions and temporal patterns. The Linear Learner model 
  was trained/evaluated on engineered features to predict resolution duration, with confusion 
  matrix analysis to assess prediction accuracy across complaint categories.

results_impact: >
  Successfully deployed a predictive model that forecasts resolution times for NYC 311 
  complaints with measurable accuracy. Model insights identify high-volume complaint types 
  and agencies with longer resolution windows. Stakeholder question 3 analysis validates 
  model performance and provides actionable recommendations for prioritizing complaint categories. 
  The cloud-based approach enables retraining on new data and integration with city services.

